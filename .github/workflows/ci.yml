name: RAG CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests only
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest -v -m "not integration"

      # 🚀 DEPLOY BACKEND
      - name: Deploy Backend to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          sudo apt-get update
          sudo apt-get install -y rsync

          git config --global user.email "you@example.com"
          git config --global user.name "github-actions"

          git clone https://user:$HF_TOKEN@huggingface.co/spaces/Hitan2004/agentic-corrective-rag hf_backend

          rsync -av --exclude='.git' --exclude='ui' ./ hf_backend/

          cd hf_backend
          git add .
          git commit -m "Auto deploy backend" || echo "No changes"
          git push

      # 🎨 DEPLOY UI
      - name: Deploy UI to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/Hitan2004/agentic-corrective-rag-ui hf_ui

          rsync -av ui/ hf_ui/

          cd hf_ui
          git add .
          git commit -m "Auto deploy UI" || echo "No changes"
          git push
